name: Test en bouw NOWA CRM

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Bestaande release-tag waaraan het Windows-pakket wordt toegevoegd, bijvoorbeeld v0.3.0'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  test-en-bouw:
    runs-on: windows-latest
    steps:
      - name: Broncode ophalen
        uses: actions/checkout@v4

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Afhankelijkheden installeren
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Tests uitvoeren
        run: python -m pytest -q

      - name: Windows-app bouwen
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --onedir `
            --name NOWA_CRM --paths src src/nowa_crm/app.py
          $forbidden = Get-ChildItem -Recurse dist/NOWA_CRM -File |
            Where-Object { $_.Name -match '\.(sqlite3|db)$' -or $_.Name -eq 'vault.key' }
          if ($forbidden) { throw 'Release bevat gebruikersdata of een kluissleutel.' }
          Compress-Archive -Path dist/NOWA_CRM -DestinationPath NOWA_CRM-Windows.zip

      - name: Build beschikbaar maken
        uses: actions/upload-artifact@v4
        with:
          name: NOWA-CRM-Windows
          path: NOWA_CRM-Windows.zip

      - name: GitHub Release publiceren
        if: startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = if ("${{ inputs.release_tag }}") { "${{ inputs.release_tag }}" } else { "${{ github.ref_name }}" }
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --generate-notes --title "NOWA CRM $tag"
          }
          gh release upload $tag NOWA_CRM-Windows.zip --clobber
