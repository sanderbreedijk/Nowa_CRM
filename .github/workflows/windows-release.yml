
name: Test en bouw NOWA CRM

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Bestaande release-tag waaraan het Windows-pakket wordt toegevoegd, bijvoorbeeld v0.3.0'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  test-en-bouw:
    runs-on: windows-latest
    steps:
      - name: Broncode ophalen
        uses: actions/checkout@v6

      - name: Python installeren
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Afhankelijkheden installeren
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Tests uitvoeren
        run: python -m pytest -q

      - name: Windows-app bouwen
        shell: pwsh
        run: |
          python scripts/build_icon.py
          python -m PyInstaller --noconfirm --clean --windowed --onedir `
            --name NOWA_CRM --paths src `
            --icon build/nowa_crm_app.ico `
            --add-data "src/nowa_crm/assets;nowa_crm/assets" `
            src/nowa_crm/app.py
          Get-ChildItem -Recurse dist/NOWA_CRM -File -Filter cacert.pem |
            Rename-Item -NewName 'cacert.crt'
          if (Get-ChildItem -Recurse dist/NOWA_CRM -File -Filter cacert.pem) {
            throw 'Oude updater blokkeert cacert.pem; hernoemen is mislukt.'
          }
          if (-not (Get-ChildItem -Recurse dist/NOWA_CRM -File -Filter cacert.crt)) {
            throw 'Openbare CA-bundel ontbreekt na het bouwen.'
          }
          $forbidden = Get-ChildItem -Recurse dist/NOWA_CRM -File |
            Where-Object { $_.Name -match '\.(sqlite3|db|token|key)$' -or $_.Name -match '^(client_secret|credentials).*\.json$' }
          if ($forbidden) { throw 'Release bevat gebruikersdata of een kluissleutel.' }
          Compress-Archive -Path dist/NOWA_CRM -DestinationPath NOWA_CRM-Windows.zip

      - name: Build beschikbaar maken
        uses: actions/upload-artifact@v6
        with:
          name: NOWA-CRM-Windows
          path: NOWA_CRM-Windows.zip

      - name: GitHub Release publiceren
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'push' && github.ref == 'refs/heads/main') || inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = if ("${{ inputs.release_tag }}") {
            "${{ inputs.release_tag }}"
          } elseif ("${{ github.ref }}" -like "refs/tags/v*") {
            "${{ github.ref_name }}"
          } else {
            $version = (Select-String -Path pyproject.toml -Pattern '^version = "([^"]+)"$').Matches.Groups[1].Value
            if (-not $version) { throw 'Versienummer kon niet uit pyproject.toml worden gelezen.' }
            "v$version"
          }
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --target "${{ github.sha }}" --generate-notes --title "NOWA CRM $tag"
          }
          gh release upload $tag NOWA_CRM-Windows.zip --clobber

